name: car_estimator

services:
  gateway:
    container_name: car_estimator_gateway
    build:
      context: ./car_estimator_api_gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MODE: ${MODE:-local}
      SERVE_PORT: 4242
      PROFILE_SERVICE_ADDR: authorization:4444
      PREDICTION_SERVICE_ADDR: predictor:50051
      FEED_SERVICE_ADDR: feed:50052
    depends_on:
      authorization:
        condition: service_started
      predictor:
        condition: service_started
      feed:
        condition: service_started
    ports:
      - "${GATEWAY_HTTP_PORT:-4242}:4242"
    networks:
      - car_estimator_network

  authorization:
    container_name: car_estimator_authorization
    build:
      context: ./car_estimator_authorization
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MODE: ${MODE:-local}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      PG_ADDR: auth_db:5432
      PG_USER: ${AUTH_POSTGRES_USER:-postgres}
      PG_PASSWORD: ${AUTH_POSTGRES_PASSWORD:-postgres}
      PG_NAME: ${AUTH_POSTGRES_DB:-authdb}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis}
      REDIS_DB_NUM: ${AUTH_REDIS_DB_NUM:-0}
      MIGRATIONS_DIR: database/migrations
    depends_on:
      auth_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${AUTH_GRPC_PORT:-4444}:4444"
    networks:
      - car_estimator_network

  feed:
    container_name: car_estimator_feed
    build:
      context: ./CarEstimator_Feed
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ENV: ${MODE:-local}
      LOG_FILE: ""
      DB_ADDR: feed_db:5432
      DB_USER: ${FEED_POSTGRES_USER:-postgres}
      DB_PASSWORD: ${FEED_POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${FEED_POSTGRES_DB:-feeddb}
    depends_on:
      feed_db:
        condition: service_healthy
    ports:
      - "${FEED_GRPC_PORT:-50052}:50052"
    networks:
      - car_estimator_network

  predictor:
    container_name: car_estimator_predictor
    build:
      context: ./CarEstimator_PredictionPrice
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PREDICTION_GRPC_PORT:-50051}:50051"
    networks:
      - car_estimator_network

  auth_db:
    container_name: car_estimator_auth_db
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AUTH_POSTGRES_DB:-authdb}
      POSTGRES_USER: ${AUTH_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${AUTH_POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s
    ports:
      - "${AUTH_POSTGRES_PORT:-5432}:5432"
    volumes:
      - auth_pg_data:/var/lib/postgresql/data
    networks:
      - car_estimator_network

  feed_db:
    container_name: car_estimator_feed_db
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${FEED_POSTGRES_DB:-feeddb}
      POSTGRES_USER: ${FEED_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${FEED_POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s
    ports:
      - "${FEED_POSTGRES_PORT:-5433}:5432"
    volumes:
      - feed_pg_data:/var/lib/postgresql/data
    networks:
      - car_estimator_network

  redis:
    container_name: car_estimator_redis
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redis}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - car_estimator_network

volumes:
  auth_pg_data:
  feed_pg_data:
  redis_data:

networks:
  car_estimator_network:
    driver: bridge
